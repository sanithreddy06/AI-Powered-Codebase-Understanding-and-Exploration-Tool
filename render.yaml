services:
  - type: web
    name: ai-codebase-explorer
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOW_DEV_AUTH_FALLBACK
        value: "false"
      - key: GEMINI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: LOGIN_USERS
        sync: false
      - key: MEMBER_EMAILS
        sync: false
      - key: LLM_PROVIDER
        sync: false
